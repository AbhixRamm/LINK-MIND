<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINK MIND</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
        <h1>LINK MIND</h1>
      </div>
      <button id="open-dashboard-btn" class="icon-btn-round" title="Open Dashboard">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      </button>
    </header>

    <!-- Main Current Tab Action Area -->
    <section class="current-tab-section">
      <div class="tab-card">
        <div class="tab-info">
          <span class="tab-title" id="current-title">Loading current tab...</span>
          <span class="tab-url" id="current-url">...</span>
        </div>
        <div class="tab-actions">
          <button id="bookmark-current-btn" class="action-btn">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            <span id="bookmark-btn-text">Save Page</span>
          </button>
        </div>
      </div>
    </section>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="search-input" placeholder="Search saved links...">
      </div>
    </section>

    <!-- Search Results List Area (shown dynamically during search) -->
    <section id="search-results-section" class="saved-list-section hidden">
      <div class="section-title-row">
        <h2>Search Results</h2>
        <span id="links-count" class="badge">0</span>
      </div>
      <div id="search-links-container" class="recent-links-list">
        <!-- Dynamically loaded search results -->
      </div>
    </section>
  </div>

  <!-- Shared code and script -->
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
