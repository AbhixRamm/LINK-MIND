<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LNKMIND - Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
          <h2>LINK MIND</h2>
        </div>
      </div>

      <!-- Categories Filter Section -->
      <div class="sidebar-section">
        <div class="section-header">
          <h3>Categories</h3>
        </div>
        <div class="category-filter-list" id="category-filter-list">
          <!-- Dynamically populated -->
        </div>
        <div class="add-category-box">
          <input type="text" id="new-category-input" placeholder="New category...">
          <button id="add-category-btn" class="plus-btn" title="Add Category">+</button>
        </div>
      </div>

      <!-- Statistics Section -->
      <div class="sidebar-section">
        <div class="section-header">
          <h3>Statistics</h3>
        </div>
        <div class="stats-panel">
          <div class="stat-item">
            <span class="stat-label">Total Saved</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Starred Favorites</span>
            <span class="stat-value" id="stat-favorites">0</span>
          </div>
          <div class="stat-chart-container" id="stat-chart-container">
            <!-- Dynamically populated stats breakdown -->
          </div>
        </div>
      </div>

      <!-- AI Auto-Categorization Section -->
      <div class="sidebar-section">
        <div class="section-header">
          <h3>AI Auto-Categorization</h3>
        </div>
        <div class="add-category-box">
          <input type="password" id="gemini-api-key-input" placeholder="Gemini API Key...">
          <button id="save-api-key-btn" class="plus-btn" title="Save API Key">✓</button>
        </div>
        <div class="ai-status-message" id="ai-status-text" style="font-size: 11px; margin-top: 2px; color: var(--text-muted);">
          AI Categorization is disabled.
        </div>
      </div>

      <!-- Controls and Export/Import -->
      <div class="sidebar-footer">
        <div class="theme-toggle-row">
          <span>Dark Mode</span>
          <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider round"></span>
          </label>
        </div>
        <div class="action-buttons-grid">
          <button id="export-btn" class="btn-secondary" title="Export Backup">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Export JSON
          </button>
          <button id="import-btn-trigger" class="btn-secondary" title="Import Backup">
            <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
            Import JSON
          </button>
          <input type="file" id="import-file-input" accept=".json" class="hidden">
        </div>
        <div class="clear-all-row">
          <button id="clear-all-btn" class="btn-danger">Clear All Data</button>
        </div>
      </div>
    </aside>

    <!-- Main Content Panel -->
    <main class="main-content">
      <!-- Topbar with Search, Filters and Sort -->
      <header class="topbar">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="dashboard-search" placeholder="Search by title, url or category...">
        </div>
        
        <div class="sort-controls">
          <label for="dashboard-sort">Sort Links:</label>
          <select id="dashboard-sort" class="dropdown-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="alphabetical">Alphabetical</option>
          </select>
        </div>
      </header>

      <!-- Main Directory Section -->
      <section class="dashboard-body">
        <div class="active-filters-bar hidden" id="active-filters-bar">
          <span class="filter-tag">
            Category: <strong id="active-filter-name">None</strong>
            <button id="clear-category-filter-btn" class="close-tag-btn">&times;</button>
          </span>
        </div>
        
        <!-- Category folders grid/list -->
        <div class="folders-container" id="folders-container">
          <!-- Dynamically generated folders of links -->
        </div>
      </section>
    </main>
  </div>

  <!-- Toast Notification System -->
  <div id="dashboard-toast" class="toast-popup hidden">
    <span id="toast-message">Message here</span>
  </div>

  <!-- Modal for confirmation or inputs -->
  <div id="modal-container" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 id="modal-title">Confirm Action</h3>
      <p id="modal-body">Are you sure you want to perform this action?</p>
      <div class="modal-actions">
        <button id="modal-cancel-btn" class="btn-secondary">Cancel</button>
        <button id="modal-confirm-btn" class="btn-danger">Confirm</button>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
